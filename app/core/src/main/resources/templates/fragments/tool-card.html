<th:block th:fragment="toolCard (
    base,
    key,
    category,
    icon
)">

<th:block th:with="
    id=${base},
    link='/' + ${base},
    endpoint='/api/' + ${base},
    title=${#messages.msg('home.' + key + '.title')},
    desc=${#messages.msg('home.' + key + '.desc')}
">

<div class="tool-card"
     th:id="${id}"
     th:if="${@endpointConfiguration.isEndpointEnabled(endpoint)}"
     th:data-category="${category}">

  <a class="tool-card-link" th:href="${link}">

    <div class="tool-card-content">

      <span class="tool-icon material-symbols-rounded"
            th:classappend=" ${
              category == 'organize'  ? 'color-blue' :
              category == 'to-pdf'    ? 'color-green' :
              category == 'from-pdf'  ? 'color-cyan' :
              category == 'security'  ? 'color-red' :
              category == 'view'      ? 'color-purple' :
              category == 'advanced'  ? 'color-orange' :
              'color-teal'
            }"
            th:text="${icon}">
      </span>

      <div class="tool-text">
        <h3 th:text="${title}"></h3>
        <p th:text="${desc}"></p>
      </div>

    </div>
  </a>

</div>

</th:block>
</th:block>
